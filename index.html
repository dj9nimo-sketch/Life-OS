<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life OS | Minimalist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap');
        
        :root {
            --bg-color: #FDFDFD;
            --card-bg: #FFFFFF;
            --text-main: #55524E;
            --border-color: #F1F1EE;
            --growth: #9DB2A0;
            --fitness: #B8979F;
            --beauty: #D6BBA0;
            --soul: #A0B2C0;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        .soft-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 2.25rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.01);
            transition: all 0.2s ease;
        }

        .soft-card:active { transform: scale(0.98); }

        .heatmap-cell {
            aspect-ratio: 1;
            border-radius: 6px;
            background-color: #F9F9F7;
            border: 1px solid var(--border-color);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .heatmap-cell.today { border-color: #E5E5E0; background: #FFF; }

        .dot-group {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            padding: 2px;
            justify-content: center;
        }

        .dot { width: 3px; height: 3px; border-radius: 50%; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="no-scrollbar px-6 py-10 pb-28 flex justify-center">
    <div class="w-full max-w-[420px] space-y-9">
        
        <!-- HEADER -->
        <header class="space-y-4">
            <div class="flex justify-between items-end">
                <div class="space-y-1">
                    <h1 class="text-2xl font-light tracking-tight">Life OS</h1>
                    <div id="date-display" class="text-[10px] font-semibold text-[#B8B4AF] uppercase tracking-[0.2em]">LOADING...</div>
                </div>
                <div class="flex items-center gap-2 text-[#9A9691] text-xs font-medium bg-[#F9F9F7] px-3 py-1.5 rounded-full border border-[#F1F1EE]">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2"/></svg>
                    <span>14°C</span>
                </div>
            </div>
            <div class="pl-3 border-l-2 border-[#F1F1EE] ml-0.5">
                <p class="text-[11px] text-[#A3A09A] leading-relaxed tracking-wide font-medium">
                    14°C, 舒爽微风。宜叠穿针织，保持专注，享受当下的节奏。
                </p>
            </div>
        </header>

        <!-- RITUAL & DIARY -->
        <section class="soft-card p-8 space-y-8">
            <div class="space-y-1">
                <h2 class="text-sm font-semibold text-[#55524E]">Daily Ritual</h2>
                <p class="text-[9px] text-[#B8B4AF] font-bold uppercase tracking-widest">Schedule & Diary</p>
            </div>

            <div class="space-y-4 text-xs text-[#7A7672] font-medium">
                <div class="flex items-center gap-4"><div class="w-1 h-1 rounded-full bg-[#E5E5E0]"></div>Morning Meditation</div>
                <div class="flex items-center gap-4"><div class="w-1 h-1 rounded-full bg-[#E5E5E0]"></div>Productive Deep Work</div>
                <div class="flex items-center gap-4"><div class="w-1 h-1 rounded-full bg-[#E5E5E0]"></div>Wellness Walk</div>
            </div>

            <div class="pt-4 relative">
                <input id="diary" type="text" placeholder="Record your thoughts..." 
                    class="w-full bg-[#F9F9F7] rounded-2xl py-4 pl-5 pr-12 text-xs font-medium border border-transparent focus:bg-white focus:border-[#F1F1EE] outline-none transition-all">
                <button onclick="addDiaryNote()" class="absolute right-4 top-1/2 -translate-y-1/2 text-[#D1CDC8]">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </div>
        </section>

        <!-- HEATMAP -->
        <section class="space-y-4 px-1">
            <div class="flex justify-between items-center px-1">
                <span class="text-[10px] font-bold text-[#B8B4AF] uppercase tracking-[0.2em]">Activity Flow</span>
                <div class="flex gap-1.5">
                    <div class="w-1.5 h-1.5 rounded-full bg-[#9DB2A0]"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-[#B8979F]"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-[#D6BBA0]"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-[#A0B2C0]"></div>
                </div>
            </div>
            <div class="grid grid-cols-7 gap-2" id="heatmap-grid"></div>
        </section>

        <!-- HABIT TILES (ALL 4 MODULES) -->
        <div class="grid grid-cols-2 gap-5">
            <!-- Growth -->
            <div onclick="tapHabit('growth')" class="soft-card p-7 flex flex-col gap-6 cursor-pointer">
                <div class="flex justify-between items-start">
                    <div class="w-10 h-10 rounded-2xl flex items-center justify-center bg-[#F4F7F5] text-[#9DB2A0]">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8a13 13 0 0 1-13 13Z"/><path d="M9.5 15.34a5 5 0 0 1 0-5.34"/></svg>
                    </div>
                    <span id="count-growth" class="text-[10px] font-bold text-[#9DB2A0]">0</span>
                </div>
                <div><h3 class="text-xs font-semibold">Growth</h3><p class="text-[8px] text-[#D1CDC8] font-bold uppercase tracking-widest mt-1">Focus</p></div>
            </div>
            <!-- Fitness -->
            <div onclick="tapHabit('fitness')" class="soft-card p-7 flex flex-col gap-6 cursor-pointer">
                <div class="flex justify-between items-start">
                    <div class="w-10 h-10 rounded-2xl flex items-center justify-center bg-[#F8F4F5] text-[#B8979F]">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 14.71 13 3l-2.25 8.25H20L11 21l2.25-8.25H4Z"/></svg>
                    </div>
                    <span id="count-fitness" class="text-[10px] font-bold text-[#B8979F]">0</span>
                </div>
                <div><h3 class="text-xs font-semibold">Fitness</h3><p class="text-[8px] text-[#D1CDC8] font-bold uppercase tracking-widest mt-1">Check In</p></div>
            </div>
            <!-- Beauty -->
            <div onclick="tapHabit('beauty')" class="soft-card p-7 flex flex-col gap-6 cursor-pointer">
                <div class="flex justify-between items-start">
                    <div class="w-10 h-10 rounded-2xl flex items-center justify-center bg-[#F9F7F4] text-[#D6BBA0]">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1-1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                    </div>
                    <span id="count-beauty" class="text-[10px] font-bold text-[#D6BBA0]">0</span>
                </div>
                <div><h3 class="text-xs font-semibold">Beauty</h3><p class="text-[8px] text-[#D1CDC8] font-bold uppercase tracking-widest mt-1">Ritual</p></div>
            </div>
            <!-- Soul Space -->
            <div onclick="tapHabit('soul')" class="soft-card p-7 flex flex-col gap-6 cursor-pointer">
                <div class="flex justify-between items-start">
                    <div class="w-10 h-10 rounded-2xl flex items-center justify-center bg-[#F4F7F9] text-[#A0B2C0]">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 8a1 1 0 0 1 1 1v8a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1h12Z"/><path d="M17 12h2a2 2 0 0 1 2 2v1a2 2 0 0 1-2 2h-2"/></svg>
                    </div>
                    <span id="count-soul" class="text-[10px] font-bold text-[#A0B2C0]">0</span>
                </div>
                <div><h3 class="text-xs font-semibold">Soul Space</h3><p class="text-[8px] text-[#D1CDC8] font-bold uppercase tracking-widest mt-1">Peace</p></div>
            </div>
        </div>
    </div>

    <script>
        const now = new Date();
        const colors = { growth: '#9DB2A0', fitness: '#B8979F', beauty: '#D6BBA0', soul: '#A0B2C0' };
        let stats = { growth: 0, fitness: 0, beauty: 0, soul: 0 };

        // 初始化日期
        document.getElementById('date-display').innerText = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', weekday: 'short' }).toUpperCase();

        // 生成热力图
        const grid = document.getElementById('heatmap-grid');
        for (let i = 1; i <= 28; i++) {
            const cell = document.createElement('div');
            cell.className = `heatmap-cell ${i === now.getDate() ? 'today' : ''}`;
            cell.innerHTML = `<span class="text-[7px] font-bold text-[#D1CDC8] m-1">${i}</span><div class="dot-group" id="dots-${i}"></div>`;
            grid.appendChild(cell);
        }

        // 打卡逻辑
        function tapHabit(type) {
            stats[type]++;
            document.getElementById(`count-${type}`).innerText = stats[type];
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.style.backgroundColor = colors[type];
            document.getElementById(`dots-${now.getDate()}`).appendChild(dot);
        }

        // 日记模拟
        function addDiaryNote() {
            const input = document.getElementById('diary');
            if(input.value) {
                input.value = '';
                alert('Notes recorded for today.');
            }
        }
    </script>
</body>
</html>
