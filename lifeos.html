<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life OS - Clean & Refined</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --bg-color: #FDFCFB;
            --card-bg: #FFFFFF;
            --accent-dark: #1A1A19;
            --border-light: #F4F2EE;
            
            /* Clean Girl Palette */
            --c-growth: #8FA38E;    /* Muted Sage */
            --c-social: #9499C2;    /* Dusty Lavender/Indigo */
            --c-fitness: #C895A5;   /* Rose Quartz */
            --c-beauty: #E5B2A1;    /* Soft Terracotta/Rose */
            --c-interests: #97B7C5; /* Muted Sky */
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--accent-dark);
            letter-spacing: -0.01em;
            overflow-x: hidden;
        }

        .app-container { max-width: 460px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }
        
        .clean-card {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 2.5rem;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.01);
        }

        .heatmap-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.7s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease;
            opacity: 0;
        }
        .heatmap-container.open {
            max-height: 600px;
            opacity: 1;
            margin-top: 1.5rem;
        }

        .cal-grid { display: grid; grid-template-cols: repeat(7, 1fr); gap: 6px; }
        .cal-day {
            aspect-ratio: 1/1.1;
            border-radius: 12px;
            background: #F9F8F6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 6px 2px;
            position: relative;
        }
        .cal-day.current { border: 1.5px solid #2D2C2A; background: white; }
        
        .dot-container {
            display: grid;
            grid-template-cols: repeat(2, 1fr);
            gap: 2px;
            width: 85%;
        }
        .dot { height: 3px; border-radius: 1.5px; width: 100%; }

        .habit-dot-indicator { width: 10px; height: 10px; border-radius: 4px; }

        .bg-growth { background-color: var(--c-growth); }
        .bg-social { background-color: var(--c-social); }
        .bg-fitness { background-color: var(--c-fitness); }
        .bg-beauty { background-color: var(--c-beauty); }
        .bg-interests { background-color: var(--c-interests); }

        .input-bar {
            background: #F5F4F1;
            border-radius: 3rem;
            padding: 0.6rem;
            transition: all 0.4s ease;
        }
        .input-bar:focus-within { background: white; box-shadow: 0 20px 50px rgba(0,0,0,0.04); border: 1px solid #EEE; }

        .loader {
            border: 2px solid #EEE;
            border-top: 2px solid var(--accent-dark);
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-8">

    <div class="app-container">
        <!-- Header: Clean Style -->
        <header class="mb-12 mt-4 flex justify-between items-start">
            <div class="space-y-1">
                <h1 class="text-4xl font-extrabold tracking-tighter text-[#1A1A19]">Life OS</h1>
                <p class="text-[9px] font-black text-zinc-300 uppercase tracking-[0.5em]">Intuitive Design</p>
            </div>
            
            <div class="text-right">
                <div class="inline-flex items-center gap-2 bg-white px-4 py-2 rounded-full border border-[#F1F0ED] shadow-sm mb-3">
                    <i data-lucide="sun" size="14" class="text-amber-300"></i>
                    <span class="text-[11px] font-bold text-zinc-500">MAR 02 · 14°C</span>
                </div>
                <p id="ai-insight" class="text-[11px] text-[#A39D95] font-semibold leading-relaxed max-w-[160px]">
                    "Morning light improves circadian rhythm. Try a 5-min sun walk."
                </p>
            </div>
        </header>

        <!-- Input Bar: Minimalist -->
        <div class="input-bar mb-12 flex items-center gap-4 px-2 shadow-sm">
            <div class="w-12 h-12 rounded-full bg-zinc-900 flex items-center justify-center text-white shadow-xl">
                <i data-lucide="plus" size="20"></i>
            </div>
            <input id="diary-input" type="text" placeholder="Journal your fragments..." 
                   class="flex-1 outline-none text-sm font-medium bg-transparent placeholder:text-zinc-300">
            <div id="ai-loader" class="loader mr-2"></div>
            <button onclick="handleAISubmit()" id="send-btn" class="mr-4 text-zinc-300 hover:text-zinc-900 transition-all active:scale-90">
                <i data-lucide="arrow-right" size="24"></i>
            </button>
        </div>

        <!-- Modules -->
        <div class="space-y-5">
            
            <!-- Schedule Card (Heatmap inside) -->
            <div class="clean-card p-8 cursor-pointer active:scale-[0.98]" onclick="toggleHeatmap()">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-5">
                        <div class="w-12 h-12 rounded-3xl bg-[#F9F8F6] flex items-center justify-center">
                            <i data-lucide="calendar-range" size="22" class="text-zinc-400"></i>
                        </div>
                        <div>
                            <span class="block text-[9px] font-black text-zinc-300 uppercase tracking-[0.2em]">Flow State</span>
                            <span class="text-lg font-bold tracking-tight">Schedule & Rhythm</span>
                        </div>
                    </div>
                    <i id="chevron-icon" data-lucide="chevron-down" size="18" class="text-zinc-300 transition-transform"></i>
                </div>

                <div id="heatmap" class="heatmap-container">
                    <div class="border-t border-[#F9F8F6] pt-8 mt-4">
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-[11px] font-extrabold uppercase tracking-widest text-zinc-800">Growth Heatmap</span>
                            <span class="text-[10px] font-bold text-zinc-300">MARCH 2026</span>
                        </div>
                        <div class="cal-grid" id="calendar-grid"></div>
                        
                        <div class="mt-8 flex flex-wrap gap-x-5 gap-y-3 border-t border-[#F9F8F6] pt-8">
                            <div class="flex items-center gap-2"><div class="habit-dot-indicator bg-growth"></div><span class="text-[9px] font-bold text-zinc-400 uppercase tracking-tighter">Growth</span></div>
                            <div class="flex items-center gap-2"><div class="habit-dot-indicator bg-social"></div><span class="text-[9px] font-bold text-zinc-400 uppercase tracking-tighter">Social</span></div>
                            <div class="flex items-center gap-2"><div class="habit-dot-indicator bg-fitness"></div><span class="text-[9px] font-bold text-zinc-400 uppercase tracking-tighter">Fitness</span></div>
                            <div class="flex items-center gap-2"><div class="habit-dot-indicator bg-beauty"></div><span class="text-[9px] font-bold text-zinc-400 uppercase tracking-tighter">Beauty</span></div>
                            <div class="flex items-center gap-2"><div class="habit-dot-indicator bg-interests"></div><span class="text-[9px] font-bold text-zinc-400 uppercase tracking-tighter">Soul</span></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Dashboard Grid -->
            <div class="grid grid-cols-2 gap-5">
                <div class="clean-card p-7 flex flex-col gap-8">
                    <div class="w-10 h-10 rounded-2xl bg-[#E8EDE7] flex items-center justify-center text-[#8FA38E]"><i data-lucide="leaf" size="20"></i></div>
                    <div><span class="block text-[9px] font-black text-zinc-300 uppercase tracking-widest mb-1">Mindset</span><span class="text-md font-bold text-zinc-800">Growth</span></div>
                </div>
                <div class="clean-card p-7 flex flex-col gap-8 border-dashed">
                    <div class="w-10 h-10 rounded-2xl bg-[#F4E9ED] flex items-center justify-center text-[#C895A5]"><i data-lucide="zap" size="20"></i></div>
                    <div><span class="block text-[9px] font-black text-zinc-300 uppercase tracking-widest mb-1">Vitality</span><span class="text-md font-bold text-zinc-800">Fitness</span></div>
                </div>
                <div class="clean-card p-7 flex flex-col gap-8">
                    <div class="w-10 h-10 rounded-2xl bg-[#F6ECE9] flex items-center justify-center text-[#E5B2A1]"><i data-lucide="sparkles" size="20"></i></div>
                    <div><span class="block text-[9px] font-black text-zinc-300 uppercase tracking-widest mb-1">Wellness</span><span class="text-md font-bold text-zinc-800">Beauty Care</span></div>
                </div>
                <div class="clean-card p-7 flex flex-col gap-8">
                    <div class="w-10 h-10 rounded-2xl bg-[#EAF1F4] flex items-center justify-center text-[#97B7C5]"><i data-lucide="coffee" size="20"></i></div>
                    <div><span class="block text-[9px] font-black text-zinc-300 uppercase tracking-widest mb-1">Soul</span><span class="text-md font-bold text-zinc-800">Interests</span></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();

        // --- AI CONFIG ---
        const apiKey = "AIzaSyD5Gi0e-qLUWyhUvMbiRbqS_kRLdG_2b6o"; 
        const currentDay = 2; // Today

        // --- CALENDAR GENERATION ---
        const grid = document.getElementById('calendar-grid');
        for (let i = 1; i <= 31; i++) {
            const dayDiv = document.createElement('div');
            dayDiv.className = `cal-day ${i === currentDay ? 'current shadow-sm' : ''}`;
            dayDiv.id = `day-${i}`;
            dayDiv.innerHTML = `<span class="text-[9px] font-bold ${i === currentDay ? 'text-zinc-900' : 'text-zinc-200'}">${i}</span><div class="dot-container" id="dots-${i}"></div>`;
            grid.appendChild(dayDiv);
        }

        // --- UI LOGIC ---
        function toggleHeatmap() {
            const heatmap = document.getElementById('heatmap');
            const icon = document.getElementById('chevron-icon');
            const isOpen = heatmap.classList.toggle('open');
            icon.style.transform = isOpen ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function updateDot(type) {
            const container = document.getElementById(`dots-${currentDay}`);
            const dotId = `dot-${type}-${currentDay}`;
            if (!document.getElementById(dotId)) {
                const dot = document.createElement('div');
                dot.id = dotId;
                dot.className = `dot bg-${type}`;
                container.appendChild(dot);
            }
        }

        // --- GEMINI INTELLIGENCE ---
        async function handleAISubmit() {
            const input = document.getElementById('diary-input');
            const text = input.value.trim();
            if (!text || !apiKey) return;

            document.getElementById('ai-loader').style.display = 'block';
            document.getElementById('send-btn').style.display = 'none';

            try {
                // Analysis Prompt in Chinese, Output in JSON/English labels
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `你是一个极简、专业的白女风生活助理。
                        1. 分析这段话分类："${text}"。关键词：GROWTH, SOCIAL, FITNESS, BEAUTY, INTERESTS。
                        2. 针对日记内容或环境（14°C，空气较干），给出一个简洁、实用、地道的英文行动建议（限 12 词以内）。
                        
                        输出格式必须是 JSON：
                        {"categories": ["GROWTH", "BEAUTY"], "suggestion": "Actionable advice in English."}` }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text);
                
                // Update tracker dots
                if (result.categories) {
                    result.categories.forEach(cat => updateDot(cat.toLowerCase()));
                }

                // Update Insight block with English suggestion
                if (result.suggestion) {
                    document.getElementById('ai-insight').innerText = `"${result.suggestion}"`;
                }

                input.value = "";
                // Auto-expand for feedback
                if(!document.getElementById('heatmap').classList.contains('open')) toggleHeatmap();

            } catch (error) {
                document.getElementById('ai-insight').innerText = "System sync error. Please retry.";
            } finally {
                document.getElementById('ai-loader').style.display = 'none';
                document.getElementById('send-btn').style.display = 'block';
            }
        }
    </script>
</body>
</html>
